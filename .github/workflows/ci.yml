# $schema=https://www.schemastore.org/github-action.json
# Same chain as `just ci`, split into named steps for failure
# visibility. Tool versions come from mise.toml via mise-action.
name: CI
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          experimental: true
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate API client
        run: just gen-api
      - name: Lint
        run: just lint
      - name: Format check
        run: just fmt-check
      - name: Typecheck
        run: just typecheck
      - name: Test
        run: just test
      - name: Build
        run: just build
      - name: Bundle size budget
        run: just bundle-budget
      - name: Generated client drift check
        run: just gen-api-check
