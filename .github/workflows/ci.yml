# $schema=https://www.schemastore.org/github-action.json
# Same chain as `just ci`, split into named steps for failure
# visibility. Tool versions come from mise.toml via mise-action.
name: CI
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          experimental: true
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate API client
        run: just gen-api
      - name: Lint
        run: just lint
      - name: Format check
        run: just fmt-check
      - name: Typecheck
        run: just typecheck
      - name: Test
        run: just test
      - name: Build
        run: just build
      - name: Bundle size budget
        run: just bundle-budget
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: e2e
        run: just e2e
      - name: Generated client drift check
        run: just gen-api-check

  # Path filter so the Helm jobs only run when the chart or workflows
  # change — the Bun `ci` job above always runs.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      helm: ${{ steps.filter.outputs.helm }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            helm:
              - 'charts/**'
              - 'ct.yaml'
            workflows:
              - '.github/workflows/**'

  helm-unittest:
    name: Helm Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.helm == 'true' ||
      needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install helm-unittest plugin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: helm plugin install --verify=false https://github.com/helm-unittest/helm-unittest
      - name: Run helm-unittest
        run: helm unittest charts/docz-site

  helm-test:
    name: Helm Chart Test
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.helm == 'true' ||
      needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: helm/chart-testing-action@v2
      - name: List changed charts
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Lint charts
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config ct.yaml
      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1
      - name: Install and test charts
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config ct.yaml
