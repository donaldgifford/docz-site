# git-cliff configuration for the docz-site Helm chart CHANGELOG.
#
# This config is invoked from the chart publish workflow with
#   git-cliff --config charts/docz-site/cliff.toml \
#             --include-path 'charts/**' \
#             --output charts/docz-site/CHANGELOG.md
#
# The path filter is applied at invocation time (rather than via the
# include_path config option) so the same config can be reused for
# ad-hoc local generation against a different path filter.

[changelog]
header = """
# Helm Chart Changelog

Changes to the `docz-site` Helm chart only. For application-level
changes, see the root [CHANGELOG.md](../../CHANGELOG.md).
"""

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
{% if commit.breaking %}[**breaking**] {% endif %}\
{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""

trim = true
render_always = true

postprocessors = [
  { pattern = '<REPO>', replace = "https://github.com/donaldgifford/docz-site" },
]

[git]
conventional_commits = true
filter_unconventional = true
require_conventional = false
split_commits = false
protect_breaking_commits = false
filter_commits = false
fail_on_unmatched_commit = false
topo_order = false
topo_order_commits = true
sort_commits = "oldest"
recurse_submodules = false
use_branch_tags = false

commit_preprocessors = [
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](<REPO>/issues/${2}))" },
]

commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^refactor", group = "<!-- 2 -->Refactor" },
  { message = "^doc", group = "<!-- 3 -->Documentation" },
  { message = "^perf", group = "<!-- 4 -->Performance" },
  { message = "^style", group = "<!-- 5 -->Styling" },
  { message = "^test", group = "<!-- 6 -->Testing" },
  { message = "^chore\\(release\\): prepare for", skip = true },
  { message = "^chore\\(deps.*\\)", skip = true },
  { message = "^chore\\(pr\\)", skip = true },
  { message = "^chore\\(pull\\)", skip = true },
  { message = "^chore|^ci|^build", group = "<!-- 7 -->Miscellaneous Tasks" },
  { body = ".*security", group = "<!-- 8 -->Security" },
  { message = "^revert", group = "<!-- 9 -->Revert" },
  { message = ".*", group = "<!-- 10 -->Other" },
]

link_parsers = [
  { pattern = "#(\\d+)", href = "https://github.com/donaldgifford/docz-site/issues/$1" },
]
