# yaml-language-server: $schema=https://json.schemastore.org/helm-testsuite.json
suite: serviceaccount
templates:
  - templates/serviceaccount.yaml
tests:
  - it: should create service account by default
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: ServiceAccount

  - it: should not create service account when disabled
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set annotations when provided
    set:
      serviceAccount:
        annotations:
          my-annotation: "my-value"
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            my-annotation: "my-value"

  - it: should use custom name when provided
    set:
      serviceAccount:
        name: "custom-sa"
    asserts:
      - equal:
          path: metadata.name
          value: "custom-sa"
