# Same-origin deployment stack (IMPL-0001 Phase 4 / DESIGN-0001
# Decision 10): docz-site's Bun server is the single public entry point.
# It serves the SPA and proxies /api, /auth, /webhooks and /openapi.yaml
# to docz-api over the private network (DOCZ_API_URL), so the browser
# never talks to docz-api directly — no CORS, and the httpOnly session
# cookie is first-party.
#
# This is a reference manifest for a small single-host deployment, in
# the same spirit as docz-api's deploy/compose.yaml (which documents the
# api-side env store and secrets in detail — read it first). Adapt image
# tags, resource limits, and secret sourcing to your environment.
#
# Usage:
#   cp .env.production.example .env.production   # docz-api env store
#   mkdir -p secrets && cp /path/to/app.pem secrets/github-app.pem
#   docker compose -f deploy/compose.yaml up -d --build
#   open http://localhost:8080
---
name: docz

services:
  docz-site:
    build:
      context: ..
      dockerfile: Dockerfile
    image: docz-site:${DOCZ_SITE_TAG:-latest}
    restart: unless-stopped
    environment:
      DOCZ_API_URL: http://docz-api:8080
    # The ONLY published port in the stack — everything else is private.
    ports:
      - "8080:8080"
    depends_on:
      - docz-api

  # Built from the sibling checkout; swap for a registry image in CI.
  docz-api:
    build:
      context: ../../docz-api
      dockerfile: Dockerfile
    image: docz-api:${DOCZ_API_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgres://docz:${POSTGRES_PASSWORD:-secret}@postgres:5432/docz_api?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      MEILI_HOST: http://meilisearch:7700
      HTTP_ADDR: ":8080"
      GITHUB_APP_PRIVATE_KEY: /run/secrets/github_app_key
    secrets:
      - github_app_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: docz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: docz_api
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docz -d docz_api"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili-data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 10

secrets:
  github_app_key:
    file: ./secrets/github-app.pem

volumes:
  postgres-data: {}
  redis-data: {}
  meili-data: {}
