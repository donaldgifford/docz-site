---
version: '3.8'

# ShitWiz UI Docker Compose Configuration
# Supports two profiles: 'dev' for local development, 'demo' for production testing

services:
  # Development service with hot reload
  shitwiz-ui-dev:
    build:
      context: .
      target: dev
    volumes:
      # Mount source code for hot reload
      - .:/app
      # Prevent node_modules from being overwritten by host
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    networks:
      - shitwiz_shitwiz-demo
    profiles:
      - dev

  # Production service with optimized build + Caddy
  shitwiz-ui:
    build:
      context: .
      target: production
    ports:
      - "8081:80"
    environment:
      # API server internal hostname (Docker network)
      - API_BASE_URL=http://shitwiz-server:8080
      - ENVIRONMENT=demo
    networks:
      - shitwiz_shitwiz-demo
    # depends_on:
    #   - shitwiz-server
    profiles:
      - demo

networks:
  # Use external network created by root docker-compose.yml
  shitwiz_shitwiz-demo:
    external: true
